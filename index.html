<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  /* DARK MODE (default) */
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --bg4: #2e2e2e;
    --border: #333;
    --border2: #444;
    --text: #f0f0f0;
    --text2: #aaa;
    --text3: #666;
    --accent: #e8c56d;
    --accent2: #c9a84c;
    --green: #5cb87a;
    --green2: #3d9158;
    --red: #e05555;
    --blue: #5b9bd5;
    --radius: 12px;
    --radius-sm: 8px;
  }

  /* LIGHT MODE */
  body.light-mode {
    --bg: #f5f4f0;
    --bg2: #ffffff;
    --bg3: #f0ede8;
    --bg4: #e8e4de;
    --border: #e0dbd2;
    --border2: #c8c2b8;
    --text: #1a1a1a;
    --text2: #5a5550;
    --text3: #a09890;
    --accent: #b8862a;
    --accent2: #9a6e1e;
    --green: #2e8a50;
    --green2: #1f6638;
    --red: #c0392b;
    --blue: #2874a6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.25s, color 0.25s;
    font-size: 15px; /* base — nothing goes below 13px */
  }

  /* HEADER */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.25s, border-color 0.25s;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .restaurant-name {
    font-size: 13px; /* was 11px → bumped to min */
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px; /* was 12px → bumped */
    color: var(--text2);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* SYNC STATUS */
  .sync-status {
    font-size: 13px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TABS */
  .tab-bar {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    transition: background 0.25s;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 0;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .tab-content { display: none; flex: 1; overflow-y: auto; }
  .tab-content.active { display: block; }

  /* RECORD TAB */
  .record-section { padding: 16px 20px; }

  .name-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    transition: background 0.25s;
  }
  .name-label {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }
  .name-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
  }
  .name-input::placeholder { color: var(--text3); }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green2), var(--green));
    border-radius: 100px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    color: var(--text2);
    text-align: right;
    margin-bottom: 16px;
  }

  /* CHECKLIST */
  .checklist-section-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    margin-bottom: 6px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .check-item.completed { background: var(--bg3); }
  .check-item.completed .check-text { color: var(--text3); text-decoration: line-through; }

  .check-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.15s;
  }
  .check-box.checked { background: var(--green); border-color: var(--green); }
  .check-box svg { display: none; }
  .check-box.checked svg { display: block; }

  .check-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    color: var(--text);
    transition: color 0.15s;
  }
  .check-del-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    padding: 4px; border-radius: 4px;
    font-size: 16px; line-height: 1;
    transition: color 0.15s; flex-shrink: 0;
  }
  .check-del-btn:hover { color: var(--red); }

  /* SCHEDULED ITEMS */
  .scheduled-section { margin-top: 20px; }
  .scheduled-section-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
    padding: 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .scheduled-section-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .check-item.scheduled-item {
    border-color: rgba(184,134,42,0.25);
    background: rgba(184,134,42,0.06);
  }
  body:not(.light-mode) .check-item.scheduled-item {
    border-color: rgba(232,197,109,0.2);
    background: rgba(232,197,109,0.05);
  }

  /* MEMO SECTION */
  .memo-section {
    margin-top: 20px;
  }
  .memo-section-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    padding: 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .memo-section-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
  }
  .memo-textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    outline: none;
    resize: none;
    min-height: 90px;
    transition: border-color 0.15s, background 0.25s;
  }
  .memo-textarea:focus { border-color: var(--blue); }
  .memo-textarea::placeholder { color: var(--text3); }

  /* ADD ITEM */
  .add-item-row { display: flex; gap: 8px; margin-top: 12px; }
  .add-item-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, background 0.25s;
  }
  .add-item-input:focus { border-color: var(--border2); }
  .add-item-input::placeholder { color: var(--text3); }
  .add-btn {
    background: var(--accent); border: none;
    color: #000;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  body.light-mode .add-btn { color: #fff; }
  .add-btn:hover { background: var(--accent2); }

  /* SAVE BUTTON */
  .save-btn-wrap { padding: 16px 20px; }
  .save-btn {
    width: 100%; padding: 15px;
    background: var(--green); border: none;
    border-radius: var(--radius); color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .save-btn:hover { background: var(--green2); }

  /* HISTORY TAB */
  .history-empty {
    text-align: center; color: var(--text3);
    padding: 60px 20px; font-size: 14px;
  }
  .history-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); margin: 12px 20px;
    overflow: hidden; transition: background 0.25s;
  }
  .history-card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; cursor: pointer;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .history-card-header.open { border-bottom-color: var(--border); }
  .history-card-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .history-card-meta { display: flex; align-items: center; gap: 12px; }
  .history-badge {
    font-size: 13px; padding: 3px 8px;
    border-radius: 100px; font-weight: 500;
  }
  .badge-green { background: rgba(46,138,80,0.15); color: var(--green); }
  .badge-amber { background: rgba(184,134,42,0.15); color: var(--accent); }
  .history-worker { font-size: 13px; color: var(--text2); }
  .history-chevron { color: var(--text3); font-size: 13px; transition: transform 0.2s; }
  .history-chevron.open { transform: rotate(180deg); }
  .history-card-body { display: none; padding: 12px 16px; }
  .history-card-body.open { display: block; }
  .history-item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .history-item-row:last-child { border-bottom: none; }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-done { background: var(--green); }
  .dot-undone { background: var(--border2); }
  .history-memo {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--bg3);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    white-space: pre-wrap;
    border-left: 3px solid var(--blue);
  }
  .history-memo-label {
    font-size: 13px; color: var(--blue);
    font-weight: 600; margin-bottom: 6px;
  }

  /* SETTINGS TAB */
  .settings-section { padding: 16px 20px; }
  .settings-group {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    margin-bottom: 20px; transition: background 0.25s;
  }
  .settings-group-title {
    font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text3); padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 14px; color: var(--text); }
  .settings-sublabel { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .settings-input {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; outline: none; width: 180px;
    text-align: right; transition: background 0.25s;
  }
  .settings-input::placeholder { color: var(--text3); }

  /* TOGGLE */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle-switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 100px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: var(--text3); border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }
  .toggle-status {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text3); min-width: 20px;
  }
  .toggle-status.on { color: var(--accent); }

  .schedule-card-btn {
    width: 100%; background: var(--bg3);
    border: 1px dashed var(--border2); border-radius: var(--radius);
    padding: 20px; color: var(--text2);
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 12px;
  }
  .schedule-card-btn:hover { background: var(--bg4); border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 1000;
    align-items: flex-end; justify-content: center;
  }
  body.light-mode .modal-overlay { background: rgba(0,0,0,0.4); }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%; max-width: 500px; max-height: 90vh;
    overflow-y: auto; padding: 20px;

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc, query, where, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ===== FIREBASE CONFIG ===== */

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== COLLECTIONS ===== */
const COL = 'closing_checklist';
const STATE_DOC = 'app_state';

/* ===== SYNC HELPERS ===== */
function setSyncStatus(status) {
  // status: 'syncing' | 'synced' | 'error' | 'offline'
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (!dot || !label) return;
  dot.className = 'sync-dot ' + status;
  const isEn = window._appLang === 'en';
  const labels = {
    syncing: isEn ? 'Syncing...' : '동기화 중...',
    synced:  isEn ? 'Synced'     : '동기화 완료',
    error:   isEn ? 'Sync error' : '동기화 오류',
    offline: isEn ? 'Offline'    : '오프라인'
  };
  label.textContent = labels[status] || status;
}

/* ===== FIRESTORE SAVE STATE ===== */
async function fsSaveState(state) {
  setSyncStatus('syncing');
  try {
    await setDoc(doc(db, COL, STATE_DOC), {
      restaurantName: state.restaurantName || '',
      checklist: JSON.stringify(state.checklist || []),
      workerName: state.workerName || '',
      memo: state.memo || '',
      schedule: JSON.stringify(state.schedule || {}),
      langEN: !!state.langEN,
      lightMode: !!state.lightMode,
      updatedAt: Timestamp.now()
    });
    setSyncStatus('synced');
  } catch(e) {
    console.error('fsSaveState error:', e);
    setSyncStatus('error');
  }
}

/* ===== FIRESTORE LOAD STATE ===== */
async function fsLoadState() {
  try {
    const snap = await getDoc(doc(db, COL, STATE_DOC));
    if (snap.exists()) {
      const d = snap.data();
      return {
        restaurantName: d.restaurantName || '',
        checklist: JSON.parse(d.checklist || '[]'),
        workerName: d.workerName || '',
        memo: d.memo || '',
        schedule: JSON.parse(d.schedule || '{}'),
        langEN: !!d.langEN,
        lightMode: !!d.lightMode,
      };
    }
    return null;
  } catch(e) {
    console.error('fsLoadState error:', e);
    setSyncStatus('error');
    return null;
  }
}

/* ===== FIRESTORE SAVE HISTORY ===== */
async function fsSaveHistory(record) {
  setSyncStatus('syncing');
  try {
    const docId = 'history_' + record.date.replace(/\./g, '-');
    await setDoc(doc(db, COL, docId), {
      date: record.date,
      worker: record.worker || '',
      memo: record.memo || '',
      items: JSON.stringify(record.items || []),
      restaurantName: record.restaurantName || '',
      savedAt: Timestamp.now()
    });
    setSyncStatus('synced');
  } catch(e) {
    console.error('fsSaveHistory error:', e);
    setSyncStatus('error');
  }
}

/* ===== FIRESTORE LOAD HISTORY ===== */
async function fsLoadHistory() {
  try {
    // Calculate 7-day cutoff
    const cutoff = new Date();
    if (cutoff.getHours() < 4) cutoff.setDate(cutoff.getDate() - 1);
    cutoff.setDate(cutoff.getDate() - 7);
    const cutoffStr = formatDateStr(cutoff);

    const colRef = collection(db, COL);
    const allDocs = await getDocs(colRef);
    const records = [];

    for (const d of allDocs.docs) {
      if (!d.id.startsWith('history_')) continue;
      const data = d.data();
      if (!data.date || data.date < cutoffStr) {
        // Delete old records
        await deleteDoc(doc(db, COL, d.id));
        continue;
      }
      records.push({
        date: data.date,
        worker: data.worker || '',
        memo: data.memo || '',
        items: JSON.parse(data.items || '[]'),
        restaurantName: data.restaurantName || '',
      });
    }

    records.sort((a, b) => b.date.localeCompare(a.date));
    return records;
  } catch(e) {
    console.error('fsLoadHistory error:', e);
    setSyncStatus('error');
    return [];
  }
}

function formatDateStr(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* ===== EXPOSE TO GLOBAL ===== */
window.fsAPI = { fsLoadState, fsSaveState, fsSaveHistory, fsLoadHistory };
window.dispatchEvent(new Event('firebase-ready'));

</script>

let lang = 'ko';

  if (typeof val === 'function') return val(...args);

/* ===== STATE ===== */
const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];

let state = {
  restaurantName: '',
  checklist: [],
  workerName: '',
  memo: '',
  schedule: { mon:[], tue:[], wed:[], thu:[], fri:[], sat:[], sun:[] },
  langEN: false,
  lightMode: false
};
let history = [];
let currentDay = 0;

let _memoSaveTimer = null;

/* ===== DATE UTILS ===== */
function getBusinessDate() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);
  return now;
}
function formatDate(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function getDayOfWeek(d) { return (d.getDay() + 6) % 7; }
function getTodayKey() { return formatDate(getBusinessDate()); }

/* ===== SAVE (Firestore + localStorage fallback) ===== */
function saveLocal() {
  localStorage.setItem('dcc_state', JSON.stringify(state));
  localStorage.setItem('dcc_history', JSON.stringify(history));
}
async function save() {
  saveLocal();
  if (fsAPI) await fsAPI.fsSaveState(state);
}

/* ===== LOAD ===== */
async function load() {
  // 1. Load from localStorage first (instant)
  const s = localStorage.getItem('dcc_state');
  const h = localStorage.getItem('dcc_history');
  const lastDate = localStorage.getItem('dcc_lastDate');
  if (s) state = { ...state, ...JSON.parse(s) };
  if (h) history = JSON.parse(h);

  // 2. Try Firestore if available
  if (fsAPI) {
    const fsState = await fsAPI.fsLoadState();
    if (fsState) state = { ...state, ...fsState };
    history = await fsAPI.fsLoadHistory();
    saveLocal();
  }

  const todayKey = getTodayKey();

  // 3. Date rollover check
  if (lastDate && lastDate !== todayKey) {
    const oldState = s ? JSON.parse(s) : state;
    if (oldState.checklist && oldState.checklist.length > 0) {
      const record = {
        date: lastDate,
        worker: oldState.workerName || '—',
        memo: oldState.memo || '',
        items: oldState.checklist.map(i => ({ text: i.text, checked: i.checked })),
        restaurantName: oldState.restaurantName || ''
      };
      // Save auto-rollover record to history
      const existing = history.findIndex(r => r.date === lastDate);
      if (existing < 0) {
        history.unshift(record);
        if (fsAPI) await fsAPI.fsSaveHistory(record);
      }
    }
    state.checklist = state.checklist.map(i => ({ ...i, checked: false }));
    state.workerName = '';
    state.memo = '';
    localStorage.setItem('dcc_lastDate', todayKey);
    if (fsAPI) await fsAPI.fsSaveState(state);
  } else if (!lastDate) {
    localStorage.setItem('dcc_lastDate', todayKey);
  }

  // 4. Purge old local history (7 days)
  const cutoff = new Date(getBusinessDate());
  cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = formatDate(cutoff);
  history = history.filter(r => r.date >= cutoffStr);
  saveLocal();
}

/* ===== RENDER ===== */
function render() {
  lang = state.langEN ? 'en' : 'ko';
  window._appLang = lang;

  document.getElementById('toggleLang').checked = !!state.langEN;
  document.getElementById('toggleTheme').checked = !!state.lightMode;
  document.body.classList.toggle('light-mode', !!state.lightMode);

  const langSt = document.getElementById('langStatus');
  langSt.textContent = state.langEN ? 'ON' : 'OFF';
  langSt.className = 'toggle-status' + (state.langEN ? ' on' : '');
  const thSt = document.getElementById('themeStatus');
  thSt.textContent = state.lightMode ? 'ON' : 'OFF';
  thSt.className = 'toggle-status' + (state.lightMode ? ' on' : '');

  document.getElementById('workerName').value = state.workerName || '';
  document.getElementById('restaurantNameInput').value = state.restaurantName || '';
  document.getElementById('memoInput').value = state.memo || '';

  applyI18n();
  renderChecklist();
  updateProgress();
  renderHistory();
  updateSchedulePreview();
}

function renderChecklist() {
  const container = document.getElementById('checklistContainer');
  container.innerHTML = '';
  state.checklist.filter(i => !i.isScheduled).forEach((item) => {
    const realIdx = state.checklist.indexOf(item);
    const div = document.createElement('div');
    div.className = 'check-item' + (item.checked ? ' completed' : '');
    div.innerHTML = `
      <div class="check-box ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${realIdx})">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="check-text" onclick="toggleCheck(${realIdx})">${escHtml(item.text)}</div>
      <button class="check-del-btn" onclick="deleteItem(${realIdx})">✕</button>
    `;
    container.appendChild(div);
  });

  // Scheduled items
  const todayDow = getDayOfWeek(getBusinessDate());
  const dayKey = DAY_KEYS[todayDow];
  const scheduled = state.schedule[dayKey] || [];
  const schCont = document.getElementById('scheduledContainer');
  const secEl = document.getElementById('scheduledSection');
  const schLabel = document.getElementById('scheduledLabel');
  schCont.innerHTML = '';

  if (scheduled.length > 0) {
    secEl.style.display = 'block';
    schLabel.textContent = t('scheduled_label', T[lang].days[todayDow]);
    scheduled.forEach((text, idx) => {
      const key = 'sched_' + dayKey + '_' + idx;
      const existing = state.checklist.find(i => i.id === key);
      const checked = existing ? existing.checked : false;
      const div = document.createElement('div');
      div.className = 'check-item scheduled-item' + (checked ? ' completed' : '');
      div.innerHTML = `
        <div class="check-box ${checked ? 'checked' : ''}" onclick="toggleScheduledCheck('${key}','${escJs(text)}',${idx})">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="check-text" style="${checked?'text-decoration:line-through;color:var(--text3)':''}" onclick="toggleScheduledCheck('${key}','${escJs(text)}',${idx})">${escHtml(text)}</div>
      `;
      schCont.appendChild(div);
    });
  } else {
    secEl.style.display = 'none';
  }
}

function toggleCheck(idx) {
  state.checklist[idx].checked = !state.checklist[idx].checked;
  save(); renderChecklist(); updateProgress();
}
function toggleScheduledCheck(key, text, idx) {
  const existing = state.checklist.find(i => i.id === key);
  if (existing) existing.checked = !existing.checked;
  else state.checklist.push({ id: key, text, checked: true, isScheduled: true });
  save(); renderChecklist(); updateProgress();
}
function deleteItem(idx) {
  state.checklist.splice(idx, 1);
  save(); renderChecklist(); updateProgress();
}
function addItem() {
  const input = document.getElementById('newItemInput');
  const text = input.value.trim();
  if (!text) return;
  state.checklist.push({ id: 'item_' + Date.now(), text, checked: false });
  input.value = '';
  save(); renderChecklist(); updateProgress();
}
document.getElementById('newItemInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// Memo — debounced auto-save
document.getElementById('memoInput').addEventListener('input', function() {
  state.memo = this.value;
  saveLocal(); // instant local
  clearTimeout(_memoSaveTimer);
  _memoSaveTimer = setTimeout(() => { if (fsAPI) fsAPI.fsSaveState(state); }, 1500);
});

function updateProgress() {
  const todayDow = getDayOfWeek(getBusinessDate());
  const dayKey = DAY_KEYS[todayDow];
  const scheduledCount = (state.schedule[dayKey] || []).length;
  const regularItems = state.checklist.filter(i => !i.isScheduled);
  const scheduledItems = state.checklist.filter(i => i.isScheduled && i.id.startsWith('sched_' + dayKey));
  const total = regularItems.length + scheduledCount;
  const done = regularItems.filter(i => i.checked).length + scheduledItems.filter(i => i.checked).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = t('progress_done', done, total, pct);
}

async function saveRecord() {
  const name = document.getElementById('workerName').value.trim();
  if (!name) { showToast(t('toast_noName')); return; }
  state.workerName = name;
  state.memo = document.getElementById('memoInput').value;

  const todayKey = getTodayKey();
  const todayDow = getDayOfWeek(getBusinessDate());
  const dayKey = DAY_KEYS[todayDow];
  const scheduled = state.schedule[dayKey] || [];
  const allItems = [
    ...state.checklist.filter(i => !i.isScheduled).map(i => ({ text: i.text, checked: i.checked })),
    ...scheduled.map((text, idx) => {
      const key = 'sched_' + dayKey + '_' + idx;
      const found = state.checklist.find(i => i.id === key);
      return { text: text + ' ★', checked: found ? found.checked : false };
    })
  ];
  const record = {
    date: todayKey,
    worker: name,
    memo: state.memo,
    items: allItems,
    restaurantName: state.restaurantName || ''
  };
  const existing = history.findIndex(r => r.date === todayKey);
  if (existing >= 0) history[existing] = record;
  else history.unshift(record);

  saveLocal();
  if (fsAPI) {
    await fsAPI.fsSaveState(state);
    await fsAPI.fsSaveHistory(record);
  }
  renderHistory();
  showToast(t('toast_saved'));
}

function renderHistory() {
  const container = document.getElementById('historyContainer');
  if (!history.length) {
    container.innerHTML = `<div class="history-empty">${t('lbl_noHistory')}</div>`;
    return;
  }
  container.innerHTML = '';
  history.forEach((rec, ri) => {
    const total = rec.items.length;
    const done = rec.items.filter(i => i.checked).length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const isComplete = pct === 100;
    const card = document.createElement('div');
    card.className = 'history-card';
    const memoHtml = rec.memo ? `
      <div class="history-memo">
        <div class="history-memo-label">${t('memo_label')}</div>
        ${escHtml(rec.memo)}
      </div>` : '';
    card.innerHTML = `
      <div class="history-card-header" id="hh_${ri}" onclick="toggleHistory(${ri})">
        <div>
          <div class="history-card-date">${rec.date}</div>
          <div class="history-worker" style="margin-top:3px;">${escHtml(rec.worker)}</div>
        </div>
        <div class="history-card-meta">
          <span class="history-badge ${isComplete ? 'badge-green' : 'badge-amber'}">${done}/${total} (${pct}%)</span>
          <span class="history-chevron" id="hc_${ri}">▼</span>
        </div>
      </div>
      <div class="history-card-body" id="hb_${ri}">
        ${rec.items.map(item => `
          <div class="history-item-row">
            <div class="history-dot ${item.checked ? 'dot-done' : 'dot-undone'}"></div>
            <span style="color:${item.checked ? 'var(--text2)' : 'var(--text3)'};${item.checked ? '' : 'text-decoration:line-through'}">${escHtml(item.text)}</span>
          </div>
        `).join('')}
        ${memoHtml}
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleHistory(ri) {
  const body = document.getElementById('hb_' + ri);
  const header = document.getElementById('hh_' + ri);
  const chevron = document.getElementById('hc_' + ri);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

// SETTINGS
document.getElementById('restaurantNameInput').addEventListener('input', function() {
  state.restaurantName = this.value;
  save();
  document.getElementById('headerRestaurantName').textContent = this.value || t('default_restaurant');
});
document.getElementById('workerName').addEventListener('input', function() {
  state.workerName = this.value; saveLocal();
});

// SCHEDULE MODAL
let modalSchedule = {};
function openScheduleModal() {
  modalSchedule = JSON.parse(JSON.stringify(state.schedule));
  currentDay = 0;
  renderDayTabs(); renderDayItems();
  document.getElementById('scheduleModal').classList.add('open');
}
function closeScheduleModal() { document.getElementById('scheduleModal').classList.remove('open'); }
function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  T[lang].days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === currentDay ? ' active' : '');
    btn.textContent = day;
    btn.onclick = () => { currentDay = i; renderDayTabs(); renderDayItems(); };
    container.appendChild(btn);
  });
}
function renderDayItems() {
  const key = DAY_KEYS[currentDay];
  const items = modalSchedule[key] || [];
  const container = document.getElementById('dayItemsList');
  container.innerHTML = '';
  if (items.length === 0) { container.innerHTML = `<div class="day-empty">${t('day_empty')}</div>`; return; }
  items.forEach((text, idx) => {
    const row = document.createElement('div');
    row.className = 'day-item-row';
    row.innerHTML = `<span class="day-item-text">${escHtml(text)}</span><button class="day-item-del" onclick="deleteDayItem(${idx})">✕</button>`;
    container.appendChild(row);
  });
}
function addDayItem() {
  const input = document.getElementById('dayItemInput');
  const text = input.value.trim();
  if (!text) return;
  const key = DAY_KEYS[currentDay];
  if (!modalSchedule[key]) modalSchedule[key] = [];
  modalSchedule[key].push(text);
  input.value = '';
  renderDayItems();
}
document.getElementById('dayItemInput').addEventListener('keydown', e => { if (e.key === 'Enter') addDayItem(); });
function deleteDayItem(idx) { modalSchedule[DAY_KEYS[currentDay]].splice(idx, 1); renderDayItems(); }
function saveSchedule() {
  state.schedule = JSON.parse(JSON.stringify(modalSchedule));
  save(); updateSchedulePreview(); renderChecklist(); updateProgress();
  closeScheduleModal(); showToast(t('toast_scheduleSaved'));
}
function updateSchedulePreview() {
  const preview = document.getElementById('schedulePreview');
  const parts = [];
  T[lang].days.forEach((day, i) => {
    const count = (state.schedule[DAY_KEYS[i]] || []).length;
    if (count > 0) parts.push(t('schedule_count', day, count));
  });
  preview.textContent = parts.length > 0 ? parts.join('  ·  ') : t('schedule_none');
}

async function resetAll() {
  if (!confirm(t('confirm_reset'))) return;
  localStorage.clear();
  state = {
    restaurantName: '', checklist: [], workerName: '', memo: '',
    schedule: { mon:[], tue:[], wed:[], thu:[], fri:[], sat:[], sun:[] },
    langEN: false, lightMode: false
  };
  history = [];
  if (fsAPI) await fsAPI.fsSaveState(state);
  render();
  showToast(t('toast_reset'));
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tabBtn-' + tab).classList.add('active');
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(str) { return String(str).replace(/'/g,"\\'").replace(/\\/g,'\\\\'); }
document.getElementById('scheduleModal').addEventListener('click', function(e) { if (e.target === this) closeScheduleModal(); });

/* ===== INIT ===== */
// Wait for Firebase module to be ready, then load & render
async function init() {
  // Render immediately from localStorage so UI isn't blank
  const s = localStorage.getItem('dcc_state');
  if (s) state = { ...state, ...JSON.parse(s) };
  const h = localStorage.getItem('dcc_history');
  if (h) history = JSON.parse(h);
  render();

  // Then load full (including Firestore) once Firebase is ready
  window.addEventListener('firebase-ready', async () => {
    fsAPI = window.fsAPI;
    await load();
    render();
  }, { once: true });

  // Fallback: if firebase-ready fires before this listener (unlikely but safe)
  if (window.fsAPI) {
    fsAPI = window.fsAPI;
    await load();
    render();
  }
}
init();

// 날짜 변경 자동 감지 — 1분마다 + 화면 복귀 시 (아이패드 대응)
let _lastCheckedDate = getTodayKey();
async function checkDateChange() {
  const now = getTodayKey();
  if (now !== _lastCheckedDate) {
    _lastCheckedDate = now;
    await load();
    render();
  }
}
setInterval(checkDateChange, 60 * 1000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkDateChange();
});
</script>

<!-- Service Worker (PWA offline support) -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE_NAME = 'dcc-v1.2.0';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys => Promise.all(
      keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
    )).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request))
  );
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl)
    .then(() => console.log('[PWA] Service Worker registered'))
    .catch(err => console.warn('[PWA] SW error:', err));
}
</script>
